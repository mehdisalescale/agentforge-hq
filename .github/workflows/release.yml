# One release per tag with all three binaries (macos-arm64, macos-x64, linux-x64).
# Build jobs upload artifacts; release job downloads all and publishes once.
name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: forge-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: forge-macos-x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: forge-linux-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: cd frontend && pnpm install --frozen-lockfile && pnpm build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: cp target/${{ matrix.target }}/release/forge ${{ matrix.name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: forge-macos-arm64
      - uses: actions/download-artifact@v4
        with:
          name: forge-macos-x64
      - uses: actions/download-artifact@v4
        with:
          name: forge-linux-x64

      - name: Move binaries to workspace root
        run: |
          mv forge-macos-arm64/forge-macos-arm64 .
          mv forge-macos-x64/forge-macos-x64 .
          mv forge-linux-x64/forge-linux-x64 .

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            forge-macos-arm64
            forge-macos-x64
            forge-linux-x64
